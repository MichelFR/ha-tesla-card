name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation (plugin)
        uses: hacs/action@main
        with:
          category: plugin

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Ensure committed bundle is up to date
        run: |
          if ! git diff --quiet -- tesla-card/tesla-card.js; then
            echo "::error::tesla-card/tesla-card.js is out of date — run 'npm run build' in frontend/ and commit."
            git --no-pager diff --stat -- tesla-card/tesla-card.js
            exit 1
          fi

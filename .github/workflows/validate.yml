name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation (plugin)
        uses: hacs/action@main
        with:
          category: plugin

  lint:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check all modules
        run: |
          for f in tesla-card.js tesla-card/tesla-card.js tesla-card/src/*.js; do
            echo "checking $f"
            node --check "$f"
          done

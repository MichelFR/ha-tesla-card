name: Release

# Creates a tag + GitHub Release automatically whenever the card's
# CARD_VERSION (in tesla-card/tesla-card.js) is bumped on main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          if [ -z "$VERSION" ]; then
            echo "Could not read version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ ("^## \\[" ver "\\]") {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md > notes.md
          fi
          if [ -s notes.md ]; then echo "has=true" >> "$GITHUB_OUTPUT"; else echo "has=false" >> "$GITHUB_OUTPUT"; fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ steps.notes.outputs.has }}" = "true" ]; then
            gh release create "v$VERSION" --title "v$VERSION" --notes-file notes.md --target "${{ github.sha }}"
          else
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes --target "${{ github.sha }}"
          fi
